joint_impedance_replay_controller:
    type: franka_joint_replay/JointImpedanceTrajectoryController
    arm_id: $(arg arm_id)
    joint_names:
        - $(arg arm_id)_joint1
        - $(arg arm_id)_joint2
        - $(arg arm_id)_joint3
        - $(arg arm_id)_joint4
        - $(arg arm_id)_joint5
        - $(arg arm_id)_joint6
        - $(arg arm_id)_joint7
    # Joint impedance gains (mirror joint_impedance_example_controller defaults).
    # Lower k for a softer/safer first run, then raise for tighter tracking.
    k_gains:
        - 600.0
        - 600.0
        - 600.0
        - 600.0
        - 250.0
        - 150.0
        - 50.0
    d_gains:
        - 50.0
        - 50.0
        - 50.0
        - 20.0
        - 20.0
        - 20.0
        - 10.0
    coriolis_factor: 1.0
    # Max per-tick torque change (N*m) for the rate saturation.
    delta_tau_max: 1.0

    # --- low-rate -> 1 kHz bridging mode (override per launch with interpolation:=) ---
    #   none    -- zero-order hold: feed the stepped targets directly (baseline;
    #              stair-stepped, torque buzz, lag).
    #   lowpass -- first-order low-pass of the stepped target (smooth but lagged
    #              / rounded; cutoff below).
    #   spline  -- quintic-spline interpolation between waypoints (smooth, tracks).
    #   ruckig  -- online jerk-limited trajectory generation (smooth, feasible).
    interpolation_mode: spline

    # Cutoff for the lowpass mode (Hz). Lower = smoother but laggier.
    lowpass_cutoff_hz: 10.0

    # Ruckig kinematic limits (per joint). Defaults are the Panda limits;
    # recorded replay is slow, so these are generous.
    ruckig_max_velocity:     [2.175, 2.175, 2.175, 2.175, 2.61, 2.61, 2.61]
    ruckig_max_acceleration: [15.0, 7.5, 10.0, 12.5, 15.0, 20.0, 20.0]
    ruckig_max_jerk:         [7500.0, 3750.0, 5000.0, 6250.0, 7500.0, 10000.0, 10000.0]
