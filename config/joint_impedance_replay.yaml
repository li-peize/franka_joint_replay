joint_impedance_replay_controller:
    type: franka_joint_replay/JointImpedanceTrajectoryController
    arm_id: $(arg arm_id)
    joint_names:
        - $(arg arm_id)_joint1
        - $(arg arm_id)_joint2
        - $(arg arm_id)_joint3
        - $(arg arm_id)_joint4
        - $(arg arm_id)_joint5
        - $(arg arm_id)_joint6
        - $(arg arm_id)_joint7
    # Joint impedance gains (mirror joint_impedance_example_controller defaults).
    # Lower k for a softer/safer first run, then raise for tighter tracking.
    k_gains:
        - 600.0
        - 600.0
        - 600.0
        - 600.0
        - 250.0
        - 150.0
        - 50.0
    d_gains:
        - 50.0
        - 50.0
        - 50.0
        - 20.0
        - 20.0
        - 20.0
        - 10.0
    coriolis_factor: 1.0
    # Max per-tick torque change (N*m) for the rate saturation.
    delta_tau_max: 1.0
